<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pulse — service status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --border: #262d38;
    --text: #e6e9ee; --dim: #8b95a5;
    --up: #3fb27f; --slow: #d9a441; --down: #e5534b;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: "DM Sans", system-ui, sans-serif; }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 28px 20px 60px; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
  h1 { font-size: 22px; margin: 0; letter-spacing: .3px; }
  h1 .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 9px; }
  .meta { color: var(--dim); font-size: 13px; font-family: "DM Mono", monospace; }
  .banner { border-radius: 10px; padding: 12px 16px; margin: 16px 0 26px; font-weight: 500; border: 1px solid var(--border); background: var(--panel); }
  .banner.up { border-color: #234636; } .banner.slow { border-color: #57431a; } .banner.down { border-color: #5c2622; }
  h2 { font-size: 14px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.2px; margin: 30px 0 12px; font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px 12px; }
  .card .top { display: flex; align-items: center; gap: 9px; }
  .sdot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .up-bg { background: var(--up); } .slow-bg { background: var(--slow); } .down-bg { background: var(--down); }
  .card .name { font-weight: 500; font-size: 15px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .lat { font-family: "DM Mono", monospace; font-size: 14px; }
  .lat.up { color: var(--up); } .lat.slow { color: var(--slow); } .lat.down { color: var(--down); }
  .card .sub { color: var(--dim); font-size: 12px; margin-top: 3px; font-family: "DM Mono", monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .spark { margin-top: 10px; width: 100%; height: 42px; }
  .uptime { color: var(--dim); font-size: 11.5px; margin-top: 6px; font-family: "DM Mono", monospace; }
  .vantage { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; font-size: 13px; }
  .vantage table { border-collapse: collapse; width: 100%; font-family: "DM Mono", monospace; font-size: 12.5px; }
  .vantage td, .vantage th { text-align: left; padding: 4px 10px 4px 0; color: var(--dim); font-weight: 400; }
  .vantage td.ok { color: var(--up); } .vantage td.bad { color: var(--down); }
  .vantage .u { color: var(--text); }
  footer { margin-top: 40px; color: var(--dim); font-size: 12px; }
  footer a { color: var(--dim); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="dot" id="overall-dot" style="background:var(--dim)"></span>Pulse</h1>
    <span class="meta" id="updated">loading…</span>
  </header>
  <div class="banner" id="banner">Loading status…</div>
  <div id="services"></div>
  <h2>Multi-vantage view <span style="text-transform:none;letter-spacing:0">(check-host.net, hourly)</span></h2>
  <div class="vantage" id="vantage">No vantage data yet.</div>
  <footer>
    Probes every 5 minutes from GitHub Actions ·
    <a href="https://github.com/Human-Centered-Tech/hct-pulse">hct-pulse</a> ·
    incidents tracked as <a href="https://github.com/Human-Centered-Tech/hct-pulse/issues?q=label%3Aincident">issues</a>
  </footer>
</div>
<script>
const COLORS = { up: "var(--up)", slow: "var(--slow)", down: "var(--down)" };
const LABEL = { up: "All systems operational", slow: "Degraded performance", down: "Outage detected" };

async function fetchJSON(path) {
  const res = await fetch(path + "?t=" + Date.now());
  if (!res.ok) throw new Error(path + " " + res.status);
  return res.json();
}
async function fetchHistory() {
  const days = [0, 1].map(d => new Date(Date.now() - d * 86400e3).toISOString().slice(0, 10));
  const lines = [];
  for (const day of days) {
    try {
      const txt = await (await fetch(`data/history/${day}.jsonl?t=${Date.now()}`)).text();
      if (txt.trim().startsWith("{")) lines.push(...txt.trim().split("\n").map(l => JSON.parse(l)));
    } catch {}
  }
  const cutoff = Date.now() - 24 * 3600e3;
  return lines.filter(l => new Date(l.ts).getTime() >= cutoff).sort((a, b) => a.ts.localeCompare(b.ts));
}

function sparkline(points, warnMs) {
  if (points.length < 2) return "";
  const w = 300, h = 42, max = Math.max(warnMs * 1.2, ...points.map(p => p.total || 0));
  const x = i => (i / (points.length - 1)) * w;
  const y = v => h - 3 - (Math.min(v, max) / max) * (h - 8);
  const path = points.map((p, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(p.total || max).toFixed(1)}`).join(" ");
  const warnY = y(warnMs).toFixed(1);
  const dots = points.map((p, i) => p.state !== "up"
    ? `<circle cx="${x(i).toFixed(1)}" cy="${y(p.total || max).toFixed(1)}" r="2.4" fill="${p.state === "down" ? "var(--down)" : "var(--slow)"}"/>` : "").join("");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="0" y1="${warnY}" x2="${w}" y2="${warnY}" stroke="var(--border)" stroke-dasharray="3 4"/>
    <path d="${path}" fill="none" stroke="var(--up)" stroke-width="1.6" opacity=".9"/>${dots}</svg>`;
}

async function render() {
  let latest;
  try { latest = await fetchJSON("data/latest.json"); }
  catch { document.getElementById("banner").textContent = "No probe data yet — waiting for the first workflow run."; return; }
  const history = await fetchHistory();

  document.getElementById("overall-dot").style.background = COLORS[latest.overall];
  document.getElementById("updated").textContent = "updated " + new Date(latest.ts).toLocaleString();
  const banner = document.getElementById("banner");
  banner.textContent = LABEL[latest.overall];
  banner.className = "banner " + latest.overall;

  const byService = {};
  for (const r of latest.results) (byService[r.service] ??= []).push(r);
  const container = document.getElementById("services");
  container.innerHTML = "";
  for (const [service, endpoints] of Object.entries(byService)) {
    const h = document.createElement("h2");
    h.textContent = service;
    container.appendChild(h);
    const grid = document.createElement("div");
    grid.className = "grid";
    for (const ep of endpoints) {
      const series = history.map(l => l.r[ep.id]).filter(Boolean).map(([state, total]) => ({ state, total }));
      const upCount = series.filter(p => p.state === "up").length;
      const uptime = series.length ? ((upCount / series.length) * 100).toFixed(1) : "—";
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="top">
          <span class="sdot ${ep.state}-bg"></span>
          <span class="name" title="${ep.url}">${ep.name}</span>
          <span class="lat ${ep.state}">${ep.total != null ? ep.total + "ms" : "—"}</span>
        </div>
        <div class="sub">HTTP ${ep.status ?? "n/a"}${ep.edge ? " · edge " + ep.edge : ""}${ep.error ? " · " + ep.error : ""}</div>
        ${sparkline(series, 3000)}
        <div class="uptime">24h: ${uptime}% up · ${series.length} probes</div>`;
      grid.appendChild(card);
    }
    container.appendChild(grid);
  }

  try {
    const v = await fetchJSON("data/vantage.json");
    const el = document.getElementById("vantage");
    let html = `<div class="meta" style="margin-bottom:8px">as of ${new Date(v.ts).toLocaleString()}</div><table>`;
    for (const [url, nodes] of Object.entries(v.results)) {
      html += `<tr><th class="u" colspan="3">${url}</th></tr>`;
      if (nodes.error) { html += `<tr><td class="bad" colspan="3">check failed: ${nodes.error}</td></tr>`; continue; }
      for (const [node, r] of Object.entries(nodes)) {
        const cls = r.ok ? "ok" : "bad";
        html += `<tr><td>${node}</td><td class="${cls}">${r.ok ? "OK" : "FAIL"}</td><td>${r.seconds != null ? r.seconds + "s" : ""} ${r.detail ?? ""}</td></tr>`;
      }
    }
    el.innerHTML = html + "</table>";
  } catch {}
}
render();
setInterval(render, 60000);
</script>
</body>
</html>
